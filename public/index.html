<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Prism</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<script src="/vendor/marked.umd.js"></script>
<script src="/vendor/purify.min.js"></script>
<script>
  window.MathJax = {
    tex: { inlineMath: [['\\(', '\\)']], displayMath: [['\\[', '\\]']] },
    svg: { fontCache: 'global' },
    startup: { typeset: false },
  };
</script>
<script src="/vendor/mathjax.js" async></script>
<style>
  :root {
    --card: #ffffff;
    --ink: #1c1c20;
    --muted: #8a8a93;
    --line: #e8e8ee;
    --claude: #cc7a56;
    --gemini: #4285f4;
    --codex:  #10a37f;
    --app-font: -apple-system, BlinkMacSystemFont, system-ui, "Segoe UI", sans-serif;
    --read-size: 16px;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; display: flex; flex-direction: column;
    background: linear-gradient(180deg, #f7f7f9 0%, #eef0f4 100%);
    color: var(--ink); font-size: 16px;
    font-family: var(--app-font);
  }

  .app { flex: 1; display: flex; min-height: 0; }

  /* Sidebar */
  .sidebar {
    width: 268px; flex: none; display: flex; flex-direction: column;
    border-right: 1px solid var(--line); background: rgba(255,255,255,0.55);
  }
  .brand { padding: 16px 18px 10px; }
  .brand h1 { font-size: 18px; font-weight: 700; margin: 0; letter-spacing: -0.01em; }
  .brand .tag { font-size: 12px; color: var(--muted); }
  .newchat {
    margin: 6px 12px 10px; padding: 10px 14px; border: 1px solid #dcdce4; border-radius: 10px;
    background: #fff; cursor: pointer; font: inherit; font-size: 14px; font-weight: 600; text-align: left;
  }
  .newchat:hover { background: #f3f3f7; }
  .tempbtn { margin-top: 0; }
  .tempbtn.active { background: #efe9dd; border-color: #d8ccae; color: #6b5b2e; }
  .temp-banner {
    display: none; text-align: center; padding: 8px 12px; font-size: 13px;
    color: #7c6a3a; background: #f6f1e3; border-bottom: 1px solid #e7dcc2;
  }
  body.temp .temp-banner { display: block; }
  .update-banner { display: none; text-align: center; padding: 8px 12px; font-size: 13px; color: #2b4a7c; background: #eaf1fb; border-bottom: 1px solid #cfe0f5; }
  .update-banner.show { display: block; }
  .update-banner .x { margin-left: 12px; cursor: pointer; color: #7a93b8; font-weight: 700; }
  .conv-list { flex: 1; overflow: auto; padding: 4px 8px 12px; }
  .conv-list .empty { color: #b6b6c0; font-size: 13px; padding: 10px 12px; }
  .conv-item {
    display: flex; align-items: center; gap: 6px; padding: 9px 11px; border-radius: 9px;
    cursor: pointer; font-size: 14px; color: #38383f;
  }
  .conv-item:hover { background: #ececf1; }
  .conv-item.active { background: #e2e2ea; font-weight: 600; }
  .conv-item .title { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .conv-item .del {
    flex: none; border: none; background: none; color: #a6a6b0; cursor: pointer;
    font-size: 16px; line-height: 1; padding: 2px 4px; border-radius: 6px; opacity: 0;
  }
  .conv-item:hover .del { opacity: 1; }
  .conv-item .del:hover { background: #d8d8e0; color: #555; }
  .conv-item .ren {
    flex: none; border: none; background: none; color: #a6a6b0; cursor: pointer;
    padding: 2px 4px; border-radius: 6px; opacity: 0; display: flex; align-items: center;
  }
  .conv-item .ren svg { width: 14px; height: 14px; }
  .conv-item:hover .ren { opacity: 1; }
  .conv-item .ren:hover { background: #d8d8e0; color: #555; }
  .conv-item .title.editing { background: #fff; outline: 1px solid #b9b9c6; border-radius: 4px; padding: 1px 5px; cursor: text; }

  /* Settings button (bottom-left) */
  .settings-btn {
    margin: 8px 12px 12px; padding: 9px 12px; border: 1px solid #dcdce4; border-radius: 10px;
    background: #fff; cursor: pointer; font: inherit; font-size: 14px; color: #38383f;
    display: flex; align-items: center; gap: 8px;
  }
  .settings-btn:hover { background: #f3f3f7; }
  .settings-btn svg { width: 16px; height: 16px; }

  /* Settings modal */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 60; display: none; align-items: center; justify-content: center;
    background: rgba(30,30,45,0.4); backdrop-filter: blur(2px);
  }
  .modal-overlay.show { display: flex; }
  .modal {
    width: min(620px, 92vw); max-height: 82vh; display: flex; flex-direction: column;
    background: #fff; border-radius: 16px; box-shadow: 0 18px 50px rgba(20,20,40,0.25); overflow: hidden;
  }
  .modal-head { display: flex; align-items: center; padding: 16px 20px; border-bottom: 1px solid var(--line); }
  .modal-head h2 { margin: 0; font-size: 17px; flex: 1; }
  .modal-close { border: none; background: none; font-size: 22px; line-height: 1; cursor: pointer; color: #9a9aa5; }
  .modal-close:hover { color: #555; }
  .modal-body { padding: 4px 20px; overflow: auto; }
  .modal-foot { display: flex; justify-content: flex-end; gap: 10px; padding: 14px 20px; border-top: 1px solid var(--line); }
  .btn-primary { padding: 9px 20px; border: none; border-radius: 10px; background: var(--ink); color: #fff; font: inherit; font-weight: 600; cursor: pointer; }
  .btn-secondary { padding: 9px 18px; border: 1px solid #dcdce4; border-radius: 10px; background: #fff; font: inherit; cursor: pointer; }
  .skill-section { padding: 14px 0; border-bottom: 1px solid var(--line); }
  .skill-section:last-child { border-bottom: none; }
  .skill-provider { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 14px; margin-bottom: 4px; }
  .skill-provider .dot { width: 9px; height: 9px; border-radius: 50%; }
  .skill-provider .dot[data-id="claude"] { background: var(--claude); }
  .skill-provider .dot[data-id="gemini"] { background: var(--gemini); }
  .skill-provider .dot[data-id="codex"]  { background: var(--codex); }
  .skill-note { font-size: 12px; color: var(--muted); margin: 0 0 6px 17px; }
  .skill-row { display: flex; gap: 10px; padding: 7px 0 7px 17px; align-items: flex-start; cursor: pointer; }
  .skill-row input { margin-top: 3px; flex: none; }
  .skill-name { font-weight: 600; font-size: 14px; }
  .skill-text { min-width: 0; }
  .skill-desc { display: block; font-size: 12px; color: var(--muted); line-height: 1.4; margin-top: 3px; }
  .skill-nameline { display: flex; align-items: center; gap: 6px; }
  .skill-info { border: none; background: none; cursor: pointer; color: #b6b6c0; padding: 0; display: flex; }
  .skill-info svg { width: 14px; height: 14px; }
  .skill-info:hover { color: #777; }
  .skill-empty { font-size: 13px; color: #b6b6c0; padding: 4px 0 4px 17px; }

  /* Main */
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .conversation { flex: 1; overflow: auto; padding: 22px; }
  .conversation:empty { display: flex; align-items: center; justify-content: center; }
  .conversation:empty::before {
    content: "Ask Claude, Gemini, and ChatGPT the same thing at once. Drop files to attach.";
    color: #b6b6c0; font-size: 17px;
  }
  .stream { max-width: 1500px; margin: 0 auto; }

  .turn { margin-bottom: 30px; }
  .turn:last-child { margin-bottom: 8px; }
  .msg.user {
    margin: 0 0 14px auto; max-width: 70%; width: fit-content;
    background: var(--ink); color: #fff; border-radius: 16px; padding: 11px 16px;
    font-size: var(--read-size); line-height: 1.5; white-space: pre-wrap; overflow-wrap: anywhere;
  }
  .msg.user .atts { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .msg.user .att {
    display: inline-flex; align-items: center; gap: 6px; font-size: 13px; padding: 4px 9px;
    background: rgba(255,255,255,0.16); border: 1px solid rgba(255,255,255,0.22); border-radius: 8px;
  }
  .msg.user .targets { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .msg.user .target { font-size: 12px; font-weight: 600; padding: 3px 9px; border-radius: 7px; background: rgba(255,255,255,0.22); }

  .responses { display: flex; gap: 16px; align-items: stretch; }
  .response-box {
    flex: 1; min-width: 0; display: flex; flex-direction: column;
    background: var(--card); border: 1px solid var(--line);
    border-top: 3px solid var(--accent); border-radius: 14px; overflow: hidden;
    box-shadow: 0 1px 3px rgba(20,20,40,0.04), 0 6px 20px rgba(20,20,40,0.05);
  }
  .response-box[data-id="claude"] { --accent: var(--claude); }
  .response-box[data-id="gemini"] { --accent: var(--gemini); }
  .response-box[data-id="codex"]  { --accent: var(--codex); }

  .rbox-head {
    display: flex; align-items: center; gap: 9px;
    padding: 11px 15px; border-bottom: 1px solid var(--line); font-weight: 600; font-size: 15px;
  }
  .rbox-head .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--accent); flex: none; }
  .rbox-head .name { flex: 1; }
  .status { font-size: 12px; font-weight: 500; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .status.running .pulse { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: pulse 1s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: .3; } 50% { opacity: 1; } }

  .assistant { flex: 1; padding: 16px 18px; font-size: var(--read-size); line-height: 1.6; color: #25252b; }
  .loader { display: inline-flex; gap: 6px; padding: 2px 0; }
  .loader span { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); opacity: .35; animation: dotbounce 1s infinite ease-in-out; }
  .loader span:nth-child(2) { animation-delay: .15s; }
  .loader span:nth-child(3) { animation-delay: .3s; }
  @keyframes dotbounce { 0%, 80%, 100% { transform: translateY(0); opacity: .35; } 40% { transform: translateY(-5px); opacity: 1; } }

  /* Markdown */
  .assistant h1, .assistant h2, .assistant h3 { line-height: 1.3; margin: 1.1em 0 .5em; font-weight: 700; }
  .assistant h1 { font-size: 1.35em; } .assistant h2 { font-size: 1.2em; } .assistant h3 { font-size: 1.08em; }
  .assistant p { margin: 0 0 .85em; }
  .assistant ul, .assistant ol { margin: 0 0 .85em; padding-left: 1.4em; }
  .assistant li { margin: .25em 0; }
  .assistant a { color: var(--accent); }
  .assistant strong { font-weight: 700; }
  .assistant code {
    font-family: "SF Mono", ui-monospace, Menlo, Consolas, monospace; font-size: .87em;
    background: #f1f1f4; padding: .15em .4em; border-radius: 5px;
  }
  .assistant pre {
    background: #1e1e26; color: #e6e6ec; padding: 13px 15px; border-radius: 10px;
    overflow: auto; margin: 0 0 .9em; font-size: .84em; line-height: 1.5;
  }
  .assistant pre code { background: none; padding: 0; color: inherit; }
  .assistant blockquote { margin: 0 0 .85em; padding: .2em 1em; border-left: 3px solid var(--line); color: var(--muted); }
  .assistant table { border-collapse: collapse; margin: 0 0 .9em; width: 100%; font-size: .9em; }
  .assistant th, .assistant td { border: 1px solid var(--line); padding: 6px 10px; text-align: left; }
  .assistant hr { border: none; border-top: 1px solid var(--line); margin: 1.2em 0; }
  .assistant > *:first-child { margin-top: 0; } .assistant > *:last-child { margin-bottom: 0; }

  /* Humanize button + result */
  .humanize-btn {
    flex: none; border: 1px solid var(--line); background: #fff; color: #555;
    font: inherit; font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 7px; cursor: pointer;
  }
  .humanize-btn:hover { background: #f3f3f7; }
  .humanize-btn:disabled { opacity: .5; cursor: default; }
  .expand-btn { flex: none; border: none; background: none; color: #9a9aa5; cursor: pointer; padding: 3px; border-radius: 6px; display: flex; }
  .expand-btn:hover { background: #f1f1f5; color: #555; }
  .expand-btn svg { width: 15px; height: 15px; }
  .responses.has-expanded .response-box:not(.expanded) { display: none; }
  .humanized { margin: 0 18px 16px; padding-top: 12px; border-top: 1px dashed var(--line); }
  .humanized-label { font-size: 11px; font-weight: 700; color: var(--accent); letter-spacing: .04em; margin-bottom: 6px; }
  .humanized-body { font-size: var(--read-size); line-height: 1.6; color: #25252b; }
  .font-select { font: inherit; font-size: 13px; padding: 4px 8px; border: 1px solid #dcdce4; border-radius: 8px; background: #fff; cursor: pointer; }
  .model-input { font: inherit; font-size: 13px; padding: 5px 9px; border: 1px solid #dcdce4; border-radius: 8px; background: #fff; min-width: 230px; }
  mjx-container[display="true"] { overflow-x: auto; overflow-y: hidden; max-width: 100%; }

  /* Compare / synthesis */
  .compare-bar { display: flex; justify-content: center; margin-top: 14px; }
  .compare-btn { border: 1px solid var(--line); background: #fff; color: #4a4a55; font: inherit; font-size: 13px; font-weight: 600; padding: 7px 18px; border-radius: 10px; cursor: pointer; }
  .compare-btn:hover { background: #f3f3f7; }
  .compare-btn:disabled { opacity: .5; cursor: default; }
  .synthesis { margin-top: 14px; background: #faf8ff; border: 1px solid #e7defb; border-radius: 14px; padding: 16px 20px; }
  .synthesis-head { font-weight: 700; font-size: 14px; color: #6b4ea8; margin-bottom: 12px; }
  .synthesis-body { font-size: var(--read-size); line-height: 1.6; }
  .syn-section { margin-bottom: 14px; }
  .syn-section:last-child { margin-bottom: 0; }
  .syn-h { font-weight: 700; font-size: 11px; letter-spacing: .05em; text-transform: uppercase; color: #8a7bb0; margin-bottom: 7px; }
  .syn-consensus { margin: 0; padding-left: 0; list-style: none; }
  .syn-consensus li { position: relative; padding-left: 22px; margin: 5px 0; font-size: var(--read-size); line-height: 1.5; }
  .syn-consensus li::before { content: "\2713"; position: absolute; left: 0; color: var(--codex); font-weight: 700; }
  .syn-diff { background: #fff; border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px; margin-bottom: 8px; }
  .syn-diff:last-child { margin-bottom: 0; }
  .syn-diff-topic { font-weight: 600; font-size: var(--read-size); margin-bottom: 6px; }
  .syn-pos { display: flex; gap: 9px; align-items: baseline; margin: 5px 0; font-size: var(--read-size); line-height: 1.5; }
  .syn-pill { flex: none; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 6px; color: #fff; background: #9a9aa5; white-space: nowrap; }
  .syn-pill[data-id="claude"] { background: var(--claude); }
  .syn-pill[data-id="gemini"] { background: var(--gemini); }
  .syn-pill[data-id="codex"] { background: var(--codex); }
  .syn-stance { min-width: 0; }

  /* Composer */
  .composer { padding: 14px 16px 18px; }
  .attachments { max-width: 920px; margin: 0 auto 8px; display: none; flex-wrap: wrap; gap: 8px; }
  .chip {
    display: flex; align-items: center; gap: 8px; background: #fff; border: 1px solid #dcdce4;
    border-radius: 10px; padding: 6px 8px 6px 10px; font-size: 13px; max-width: 240px;
  }
  .chip .thumb { width: 28px; height: 28px; object-fit: cover; border-radius: 6px; flex: none; }
  .chip .fileicon { color: #9a9aa5; flex: none; display: flex; }
  .chip .cname { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .chip .rm { border: none; background: none; cursor: pointer; color: #a6a6b0; font-size: 16px; line-height: 1; padding: 0 2px; flex: none; }
  .chip .rm:hover { color: #555; }
  .composer-inner {
    max-width: 920px; margin: 0 auto; display: flex; gap: 6px; align-items: flex-end;
    background: var(--card); border: 1px solid #dcdce4; border-radius: 16px;
    padding: 8px 10px 8px 8px; box-shadow: 0 4px 18px rgba(20,20,40,0.07);
  }
  .composer-inner:focus-within { border-color: #b9b9c6; box-shadow: 0 4px 22px rgba(20,20,40,0.10); }
  .attach {
    flex: none; width: 38px; height: 40px; border: none; background: none; cursor: pointer;
    color: #9a9aa5; display: flex; align-items: center; justify-content: center; border-radius: 9px;
  }
  .attach:hover { background: #f1f1f5; color: #555; }
  .attach svg { width: 20px; height: 20px; }
  textarea {
    flex: 1; resize: none; border: none; outline: none; background: none;
    font: inherit; font-size: 16px; line-height: 1.5; color: var(--ink);
    max-height: 200px; padding: 8px 0;
  }
  button#send {
    flex: none; height: 40px; padding: 0 22px; border: none; border-radius: 11px; cursor: pointer;
    font: inherit; font-weight: 600; font-size: 15px; color: #fff;
    background: var(--ink); transition: opacity .15s, transform .05s;
  }
  button#send:hover { opacity: .88; }
  button#send:active { transform: translateY(1px); }
  button#send:disabled { opacity: .4; cursor: default; }
  .composer .hint { max-width: 920px; margin: 8px auto 0; font-size: 12px; color: var(--muted); text-align: center; }

  /* Drag-and-drop overlay */
  #dropOverlay {
    position: fixed; inset: 0; z-index: 50; display: none; align-items: center; justify-content: center;
    background: rgba(40,42,60,0.32); backdrop-filter: blur(2px);
  }
  #dropOverlay.show { display: flex; }
  #dropOverlay .box {
    background: #fff; border: 2px dashed #9aa0c0; border-radius: 18px; padding: 36px 54px;
    font-size: 18px; font-weight: 600; color: #4a4a66; box-shadow: 0 12px 40px rgba(20,20,40,0.18);
  }
</style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <h1>Prism</h1>
        <div class="tag">one prompt, three perspectives</div>
      </div>
      <button class="newchat" id="newchat">+ New chat</button>
      <button class="newchat tempbtn" id="tempchat">Temporary chat</button>
      <div class="conv-list" id="convList"></div>
      <button class="settings-btn" id="settingsBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Settings
      </button>
      <button class="settings-btn" id="skillsBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        Skills
      </button>
    </aside>

    <div class="main">
      <div class="temp-banner" id="tempBanner">Temporary chat, not saved to history.</div>
      <div class="update-banner" id="updateBanner"></div>
      <div class="conversation" id="conv"><div class="stream" id="stream"></div></div>
      <div class="composer">
        <div class="attachments" id="attachments"></div>
        <div class="composer-inner">
          <button class="attach" id="attachBtn" title="Attach files">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
          </button>
          <textarea id="prompt" rows="1" placeholder="Ask all three, or @Claude / @Gemini / @Codex to target one…"></textarea>
          <button id="send">Send</button>
        </div>
        <div class="hint">Enter to send &middot; Shift+Enter for a new line &middot; @model to ask just one &middot; drag files in to attach</div>
      </div>
    </div>
  </div>

  <input type="file" id="fileInput" multiple hidden />
  <div id="dropOverlay"><div class="box">Drop files to attach</div></div>

  <div id="settingsModal" class="modal-overlay">
    <div class="modal">
      <div class="modal-head">
        <h2>Skills</h2>
        <button class="modal-close" id="settingsClose">&times;</button>
      </div>
      <div class="modal-body" id="skillsBody"></div>
      <div class="modal-foot">
        <button class="btn-secondary" id="settingsCancel">Cancel</button>
        <button class="btn-primary" id="settingsSave">Save</button>
      </div>
    </div>
  </div>

<script>
marked.setOptions({ gfm: true, breaks: true });
const md = (text) => DOMPurify.sanitize(marked.parse(text || ''));

// Markdown + LaTeX: stash math spans before markdown (so $a_i$ isn't mangled),
// run markdown, then restore them as MathJax \( \) / \[ \] delimiters.
// Build <strong>/<em> from leftover **bold**/*italic* in a text run. marked's
// CommonMark flanking rules drop emphasis next to CJK (e.g. **단어**라는), so we
// repair what it left as literal text.
function parseInline(s) {
  const re = /\*\*([^*]+?)\*\*|__([^_]+?)__|\*([^*\s][^*]*?)\*|(?<![A-Za-z0-9])_([^_\s][^_]*?)_(?![A-Za-z0-9])/g;
  const frag = document.createDocumentFragment();
  let m, last = 0, any = false;
  while ((m = re.exec(s))) {
    any = true;
    if (m.index > last) frag.appendChild(document.createTextNode(s.slice(last, m.index)));
    const bold = m[1] ?? m[2];
    const node = document.createElement(bold != null ? 'strong' : 'em');
    node.textContent = bold != null ? bold : (m[3] ?? m[4]);
    frag.appendChild(node);
    last = re.lastIndex;
  }
  if (!any) return null;
  if (last < s.length) frag.appendChild(document.createTextNode(s.slice(last)));
  return frag;
}
function fixEmphasis(root) {
  const reTest = /\*\*[^*]+?\*\*|__[^_]+?__|\*[^*\s][^*]*?\*|_[^_\s][^_]*?_/;
  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
    acceptNode: (n) => {
      const tag = n.parentNode && n.parentNode.nodeName;
      if (['CODE', 'PRE', 'A', 'STRONG', 'EM'].includes(tag)) return NodeFilter.FILTER_REJECT;
      return reTest.test(n.nodeValue) ? NodeFilter.FILTER_ACCEPT : NodeFilter.FILTER_REJECT;
    },
  });
  const nodes = [];
  let n;
  while ((n = walker.nextNode())) nodes.push(n);
  for (const node of nodes) {
    const frag = parseInline(node.nodeValue);
    if (frag) node.parentNode.replaceChild(frag, node);
  }
}

function mdMath(text) {
  const math = [];
  const stash = (tex, display) => { math.push({ tex, display }); return `@@MJX${math.length - 1}@@`; };
  const t = (text || '')
    .replace(/\$\$([\s\S]+?)\$\$/g, (_, m) => stash(m, true))
    .replace(/\\\[([\s\S]+?)\\\]/g, (_, m) => stash(m, true))
    .replace(/\\\(([\s\S]+?)\\\)/g, (_, m) => stash(m, false))
    .replace(/(?<![\\$])\$(?!\s)([^\n$]+?)(?<![\\\s])\$(?!\d)/g, (_, m) => stash(m, false));
  const esc = (s) => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  const tmp = document.createElement('div');
  tmp.innerHTML = DOMPurify.sanitize(marked.parse(t)); // math is still @@MJX@@ placeholders here
  fixEmphasis(tmp);
  return tmp.innerHTML.replace(/@@MJX(\d+)@@/g, (_, i) => {
    const { tex, display } = math[+i];
    return display ? `\\[${esc(tex)}\\]` : `\\(${esc(tex)}\\)`;
  });
}

function renderInto(el, text) {
  el.innerHTML = mdMath(text);
  if (/[\\$]/.test(text || '') && window.MathJax?.typesetPromise) {
    if (MathJax.typesetClear) MathJax.typesetClear([el]);
    MathJax.typesetPromise([el]).catch(() => {});
  }
}

const conv = document.getElementById('conv');
const stream = document.getElementById('stream');
const convList = document.getElementById('convList');
let MODELS = [];
let currentId = null;       // active conversation id (null = unsaved new chat)
let active = {};            // model id -> streaming slot for the in-flight turn
let pendingFiles = [];      // [{ name, type, dataUrl, dataBase64 }]
let temporary = false;      // ephemeral chat: responses not saved to history
let defaultModels = [];     // models that answer when no @mention is given
let serviceModels = {};     // per-service base model override (id -> model name)

const MENTION_ALIASES = { chatgpt: 'codex', gpt: 'codex' };
function mentionToId(word) {
  const w = word.toLowerCase();
  if (MODELS.some((m) => m.id === w)) return w;
  return MENTION_ALIASES[w] || null;
}
// Pull @model mentions out of the prompt. Returns the targeted ids (empty = all
// models) and the prompt with the recognized mentions removed.
function parseMention(text) {
  const ids = [];
  const cleaned = text.replace(/@(\w+)/g, (full, word) => {
    const id = mentionToId(word);
    if (id) { if (!ids.includes(id)) ids.push(id); return ''; }
    return full;
  }).replace(/\s{2,}/g, ' ').trim();
  return { ids, cleaned };
}

async function init() {
  MODELS = await fetch('/models').then(r => r.json());
  const s = await fetch('/settings').then(r => r.json());
  defaultModels = s.defaultModels || MODELS.map((m) => m.id);
  serviceModels = s.models || {};
  await loadSidebar();
  checkVersion();
  const cid = new URLSearchParams(location.search).get('conv');
  if (cid) openConversation(cid);
}

// Banner if origin/main is ahead of the running commit.
async function checkVersion() {
  try {
    const v = await fetch('/version').then(r => r.json());
    if (!(v.behind > 0)) return;
    const b = document.getElementById('updateBanner');
    b.textContent = `Update available: ${v.behind} new commit${v.behind > 1 ? 's' : ''}.`
      + (v.latest ? ` Latest: ${v.latest}.` : '') + ' Run git pull to update.';
    const x = document.createElement('span');
    x.className = 'x'; x.textContent = '×';
    x.onclick = () => b.classList.remove('show');
    b.appendChild(x);
    b.classList.add('show');
  } catch {}
}

// Build one turn (prompt bubble + answer boxes for the targeted models);
// returns model -> {el,status}. modelIds omitted/empty means all models.
function buildTurn(prompt, attachments, modelIds) {
  const shown = (modelIds && modelIds.length) ? MODELS.filter((m) => modelIds.includes(m.id)) : MODELS;
  const turn = document.createElement('div');
  turn.className = 'turn';
  const user = document.createElement('div');
  user.className = 'msg user';
  if (shown.length < MODELS.length) {
    const t = document.createElement('div');
    t.className = 'targets';
    for (const m of shown) {
      const pill = document.createElement('span');
      pill.className = 'target';
      pill.textContent = '@' + m.label.split(' ')[0];
      t.appendChild(pill);
    }
    user.appendChild(t);
  }
  if (attachments && attachments.length) {
    const atts = document.createElement('div');
    atts.className = 'atts';
    for (const name of attachments) {
      const a = document.createElement('span');
      a.className = 'att';
      a.textContent = name;
      atts.appendChild(a);
    }
    user.appendChild(atts);
  }
  if (prompt) {
    const p = document.createElement('div');
    p.textContent = prompt;
    user.appendChild(p);
  }
  const responses = document.createElement('div');
  responses.className = 'responses';
  turn.append(user, responses);
  const boxes = {};
  for (const m of shown) {
    const box = document.createElement('div');
    box.className = 'response-box';
    box.dataset.id = m.id;
    box.innerHTML =
      `<div class="rbox-head"><span class="dot"></span><span class="name">${m.label}</span>` +
      `<span class="status"></span></div>`;
    const body = document.createElement('div');
    body.className = 'assistant';
    box.appendChild(body);
    responses.appendChild(box);
    const exp = document.createElement('button');
    exp.className = 'expand-btn';
    exp.title = 'Expand / collapse';
    exp.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>';
    exp.onclick = () => toggleExpand(box);
    box.querySelector('.rbox-head').appendChild(exp);
    const btn = document.createElement('button');
    btn.className = 'humanize-btn';
    btn.textContent = 'Humanize';
    box.querySelector('.rbox-head').appendChild(btn);
    boxes[m.id] = { el: body, status: box.querySelector('.status'), box, btn };
  }
  const compareBar = document.createElement('div');
  compareBar.className = 'compare-bar';
  const compareBtn = document.createElement('button');
  compareBtn.className = 'compare-btn';
  compareBtn.textContent = 'Compare answers';
  compareBar.appendChild(compareBtn);
  if (shown.length >= 2) turn.appendChild(compareBar);
  stream.appendChild(turn);
  return { boxes, turn, compareBtn };
}

// Click expand: one box fills the row (siblings hidden); click again restores.
function toggleExpand(box) {
  const row = box.parentElement;
  const already = box.classList.contains('expanded');
  row.querySelectorAll('.response-box.expanded').forEach((b) => b.classList.remove('expanded'));
  if (already) row.classList.remove('has-expanded');
  else { box.classList.add('expanded'); row.classList.add('has-expanded'); }
}

function setStatus(statusEl, label, running) {
  statusEl.classList.toggle('running', running);
  statusEl.innerHTML = (running ? '<span class="pulse"></span>' : '') + label;
}

function scheduleRender(slot) {
  if (slot.pending) return;
  slot.pending = true;
  requestAnimationFrame(() => {
    slot.pending = false;
    const atBottom = conv.scrollHeight - conv.scrollTop - conv.clientHeight < 100;
    renderInto(slot.el, slot.raw);
    if (atBottom) conv.scrollTop = conv.scrollHeight;
  });
}

// ----- attachments -----
function addFiles(fileList) {
  for (const file of fileList) {
    if (file.size > MAX_FILE) { alert(`${file.name} is larger than 25 MB and was skipped.`); continue; }
    const reader = new FileReader();
    reader.onload = () => {
      const url = reader.result;
      pendingFiles.push({ name: file.name, type: file.type, dataUrl: url, dataBase64: url.slice(url.indexOf(',') + 1) });
      renderChips();
    };
    reader.readAsDataURL(file);
  }
}

function renderChips() {
  const c = document.getElementById('attachments');
  c.innerHTML = '';
  c.style.display = pendingFiles.length ? 'flex' : 'none';
  pendingFiles.forEach((f, i) => {
    const chip = document.createElement('div');
    chip.className = 'chip';
    if (/^image\//.test(f.type)) {
      const img = document.createElement('img');
      img.className = 'thumb'; img.src = f.dataUrl;
      chip.appendChild(img);
    } else {
      const icon = document.createElement('span');
      icon.innerHTML = FILE_ICON;
      chip.appendChild(icon.firstChild);
    }
    const name = document.createElement('span');
    name.className = 'cname'; name.textContent = f.name;
    const rm = document.createElement('button');
    rm.className = 'rm'; rm.textContent = '×';
    rm.addEventListener('click', () => { pendingFiles.splice(i, 1); renderChips(); });
    chip.append(name, rm);
    c.appendChild(chip);
  });
}

async function send() {
  const ta = document.getElementById('prompt');
  const { ids: mentioned, cleaned: prompt } = parseMention(ta.value.trim());
  if (!prompt && !pendingFiles.length) return;
  const btn = document.getElementById('send');
  btn.disabled = true;

  const files = pendingFiles.map((f) => ({ name: f.name, dataBase64: f.dataBase64 }));
  const attachments = pendingFiles.map((f) => f.name);
  ta.value = '';
  ta.style.height = 'auto';
  pendingFiles = [];
  renderChips();

  const base = (defaultModels.length ? defaultModels : MODELS.map((m) => m.id));
  const pick = mentioned.length ? mentioned : base;
  const targetIds = MODELS.filter((m) => pick.includes(m.id)).map((m) => m.id);
  const { boxes, turn, compareBtn } = buildTurn(prompt, attachments, targetIds);
  active = {};
  for (const id of targetIds) {
    boxes[id].el.innerHTML = LOADER; // bouncing dots until the first token arrives
    const slot = { raw: '', el: boxes[id].el, status: boxes[id].status, box: boxes[id].box, btn: boxes[id].btn, pending: false };
    setStatus(slot.status, 'thinking', true);
    slot.btn.onclick = () => humanize(slot, () => slot.raw);
    active[id] = slot;
  }
  compareBtn.onclick = () => compare(turn, () => Object.fromEntries(targetIds.map((id) => [id, active[id]?.raw || ''])), compareBtn, prompt);
  conv.scrollTop = conv.scrollHeight;

  const res = await fetch('/ask', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ prompt, conversationId: currentId, files, models: targetIds, temporary }),
  });

  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let buf = '';
  while (true) {
    const { value, done } = await reader.read();
    if (done) break;
    buf += decoder.decode(value, { stream: true });
    let nl;
    while ((nl = buf.indexOf('\n')) >= 0) {
      const line = buf.slice(0, nl); buf = buf.slice(nl + 1);
      if (line.trim()) handle(JSON.parse(line));
    }
  }
  btn.disabled = false;
}

function handle(evt) {
  if (evt.type === 'saved') {
    currentId = evt.conversationId;
    loadSidebar();
    return;
  }
  const slot = active[evt.model];
  if (!slot) return;
  if (evt.type === 'chunk') {
    slot.raw += evt.text;
    scheduleRender(slot);
  } else if (evt.type === 'done') {
    scheduleRender(slot);
    setStatus(slot.status, 'done', false);
  }
}

async function loadSidebar() {
  const convs = await fetch('/conversations').then(r => r.json());
  convList.innerHTML = '';
  if (!convs.length) {
    convList.innerHTML = '<div class="empty">No conversations yet.</div>';
    return;
  }
  for (const c of convs) {
    const item = document.createElement('div');
    item.className = 'conv-item' + (c.id === currentId ? ' active' : '');
    const title = document.createElement('span');
    title.className = 'title';
    title.textContent = c.title || 'Untitled';
    const ren = document.createElement('button');
    ren.className = 'ren';
    ren.title = 'Rename';
    ren.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>';
    const del = document.createElement('button');
    del.className = 'del';
    del.textContent = '×';
    del.title = 'Delete';
    item.append(title, ren, del);
    item.addEventListener('click', () => openConversation(c.id));
    ren.addEventListener('click', (e) => { e.stopPropagation(); startRename(title, c); });
    title.addEventListener('dblclick', (e) => { e.stopPropagation(); startRename(title, c); });
    del.addEventListener('click', (e) => { e.stopPropagation(); deleteConversation(c.id); });
    convList.appendChild(item);
  }
}

// Rewrite a box's answer via the humanize-korean plugin, shown below the original.
async function humanize(slot, getText) {
  const text = (getText() || '').trim();
  if (!text) return;
  const btn = slot.btn;
  btn.disabled = true;
  const label = btn.textContent;
  btn.textContent = '…';
  try {
    const r = await fetch('/humanize', {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ text }),
    }).then((res) => res.json());
    if (r.text) {
      let el = slot.box.querySelector('.humanized');
      if (!el) { el = document.createElement('div'); el.className = 'humanized'; slot.box.appendChild(el); }
      el.innerHTML = '<div class="humanized-label">Humanized</div><div class="humanized-body"></div>';
      renderInto(el.querySelector('.humanized-body'), r.text);
    }
  } catch {}
  btn.disabled = false;
  btn.textContent = label;
}

// Semantic synthesis of a turn's answers, rendered with per-model colors.
const MODEL_SHORT = { claude: 'Claude', gemini: 'Gemini', codex: 'ChatGPT' };

async function compare(turn, getTexts, btn, prompt) {
  const texts = getTexts();
  if (Object.values(texts).filter((t) => t && t.trim()).length < 2) return;
  btn.disabled = true;
  const lbl = btn.textContent;
  btn.textContent = 'Comparing…';
  try {
    const r = await fetch('/compare', {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ prompt, responses: texts }),
    }).then((res) => res.json());
    if (r.text) renderSynthesis(turn, r.text);
  } catch {}
  btn.disabled = false;
  btn.textContent = lbl;
}

function normModel(m) {
  const x = String(m || '').toLowerCase();
  if (x.includes('claude')) return 'claude';
  if (x.includes('gemini')) return 'gemini';
  if (x.includes('codex') || x.includes('chatgpt') || x.includes('gpt')) return 'codex';
  return x;
}
function synPill(modelId) {
  const id = normModel(modelId);
  const s = document.createElement('span');
  s.className = 'syn-pill';
  s.dataset.id = id;
  s.textContent = MODEL_SHORT[id] || modelId || '?';
  return s;
}
function synSection(title) {
  const sec = document.createElement('div');
  sec.className = 'syn-section';
  const h = document.createElement('div');
  h.className = 'syn-h';
  h.textContent = title;
  sec.appendChild(h);
  return sec;
}
function synRow(modelId, txt) {
  const row = document.createElement('div');
  row.className = 'syn-pos';
  row.appendChild(synPill(modelId));
  const sp = document.createElement('span');
  sp.className = 'syn-stance';
  sp.textContent = txt || '';
  row.appendChild(sp);
  return row;
}

function renderSynthesis(turn, text) {
  let el = turn.querySelector('.synthesis');
  if (!el) { el = document.createElement('div'); el.className = 'synthesis'; turn.appendChild(el); }
  el.innerHTML = '';
  const head = document.createElement('div');
  head.className = 'synthesis-head';
  head.textContent = 'Synthesis';
  el.appendChild(head);

  let data = null;
  try { data = JSON.parse(text); } catch {}
  if (!data || typeof data !== 'object') { // fallback: render whatever came back as markdown
    const body = document.createElement('div');
    body.className = 'synthesis-body';
    renderInto(body, text);
    el.appendChild(body);
    return;
  }
  if (Array.isArray(data.consensus) && data.consensus.length) {
    const sec = synSection('Consensus');
    const ul = document.createElement('ul');
    ul.className = 'syn-consensus';
    for (const p of data.consensus) { const li = document.createElement('li'); li.textContent = p; ul.appendChild(li); }
    sec.appendChild(ul);
    el.appendChild(sec);
  }
  if (Array.isArray(data.differences) && data.differences.length) {
    const sec = synSection('Differences');
    for (const d of data.differences) {
      const card = document.createElement('div');
      card.className = 'syn-diff';
      if (d.topic) { const t = document.createElement('div'); t.className = 'syn-diff-topic'; t.textContent = d.topic; card.appendChild(t); }
      for (const pos of (d.positions || [])) card.appendChild(synRow(pos.model, pos.stance));
      sec.appendChild(card);
    }
    el.appendChild(sec);
  }
  if (Array.isArray(data.unique) && data.unique.length) {
    const sec = synSection('Unique');
    for (const u of data.unique) sec.appendChild(synRow(u.model, u.point));
    el.appendChild(sec);
  }
}

async function openConversation(id) {
  const c = await fetch('/conversations/' + id).then(r => r.json());
  markTemporary(false);
  currentId = id;
  stream.innerHTML = '';
  for (const turn of c.turns) {
    const shownIds = Object.keys(turn.responses || {});
    const { boxes, turn: turnEl, compareBtn } = buildTurn(turn.prompt, turn.attachments, shownIds);
    for (const id of shownIds) {
      if (!boxes[id]) continue;
      renderInto(boxes[id].el, turn.responses[id]);
      setStatus(boxes[id].status, 'done', false);
      const text = turn.responses[id];
      boxes[id].btn.onclick = () => humanize(boxes[id], () => text);
    }
    compareBtn.onclick = () => compare(turnEl, () => turn.responses, compareBtn, turn.prompt);
  }
  conv.scrollTop = conv.scrollHeight;
  loadSidebar();
}

function markTemporary(on) {
  temporary = on;
  document.body.classList.toggle('temp', on);
  document.getElementById('tempchat').classList.toggle('active', on);
}

function resetView() {
  currentId = null;
  stream.innerHTML = '';
  pendingFiles = [];
  renderChips();
  loadSidebar();
  document.getElementById('prompt').focus();
}

function newChat() {
  markTemporary(false);
  resetView();
}

function toggleTemporary() {
  markTemporary(!temporary);
  resetView();
}

// Inline-rename a conversation title (double-click or pencil button).
function startRename(titleEl, c) {
  if (titleEl.isContentEditable) return;
  titleEl.contentEditable = 'true';
  titleEl.classList.add('editing');
  getSelection().selectAllChildren(titleEl);
  const finish = async (save) => {
    titleEl.removeEventListener('keydown', onKey);
    titleEl.removeEventListener('blur', onBlur);
    titleEl.contentEditable = 'false';
    titleEl.classList.remove('editing');
    const t = titleEl.textContent.trim();
    if (save && t && t !== c.title) {
      await fetch('/conversations/' + c.id + '/rename', {
        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ title: t }),
      });
    }
    loadSidebar();
  };
  const onKey = (e) => {
    if (e.key === 'Enter') { e.preventDefault(); finish(true); }
    else if (e.key === 'Escape') { e.preventDefault(); finish(false); }
  };
  const onBlur = () => finish(true);
  titleEl.addEventListener('keydown', onKey);
  titleEl.addEventListener('blur', onBlur);
  titleEl.focus();
}

async function deleteConversation(id) {
  await fetch('/conversations/' + id, { method: 'DELETE' });
  if (id === currentId) { currentId = null; stream.innerHTML = ''; }
  loadSidebar();
}

const PROVIDER_LABEL = { claude: 'Claude', gemini: 'Gemini', codex: 'ChatGPT (Codex)' };

function fontRow(label, key, opts, def) {
  const row = document.createElement('label');
  row.className = 'skill-row';
  const nm = document.createElement('span');
  nm.className = 'skill-name';
  nm.textContent = label;
  nm.style.flex = 'none';
  nm.style.minWidth = '64px';
  const sel = document.createElement('select');
  sel.className = 'font-select';
  const cur = localStorage.getItem(key) || def;
  for (const [v, t] of Object.entries(opts)) {
    const o = document.createElement('option');
    o.value = v; o.textContent = t;
    if (v === cur) o.selected = true;
    sel.appendChild(o);
  }
  sel.onchange = () => { localStorage.setItem(key, sel.value); applyFont(); };
  row.append(nm, sel);
  return row;
}

let settingsMode = 'settings';
const setModalTitle = (t) => { document.querySelector('.modal-head h2').textContent = t; };

// Settings modal: Appearance + Default models. No slow /skills fetch.
const MODEL_OPTIONS = {
  claude: [['', 'Default'], ['opus', 'Opus'], ['sonnet', 'Sonnet'], ['haiku', 'Haiku']],
  gemini: [['', 'Default']],
  codex: [['', 'Default']],
};

function modelRow(m) {
  const row = document.createElement('label');
  row.className = 'skill-row';
  row.style.alignItems = 'center';
  const nm = document.createElement('span');
  nm.className = 'skill-name';
  nm.textContent = m.label;
  nm.style.flex = 'none';
  nm.style.width = '185px';
  const sel = document.createElement('select');
  sel.className = 'font-select';
  sel.dataset.modelsel = m.id;
  const inp = document.createElement('input');
  inp.type = 'text';
  inp.className = 'model-input';
  inp.dataset.modelinput = m.id;
  inp.placeholder = 'model name';
  inp.style.marginLeft = '8px';
  const cur = serviceModels[m.id] || '';
  let matched = false;
  for (const [v, l] of (MODEL_OPTIONS[m.id] || [['', 'Default']])) {
    const o = new Option(l, v);
    if (v === cur) { o.selected = true; matched = true; }
    sel.add(o);
  }
  const customOpt = new Option('Custom…', '__custom__');
  sel.add(customOpt);
  if (cur && !matched) { customOpt.selected = true; inp.value = cur; } else { inp.style.display = 'none'; }
  sel.onchange = () => { if (sel.value === '__custom__') { inp.style.display = ''; inp.focus(); } else { inp.style.display = 'none'; } };
  row.append(nm, sel, inp);
  return row;
}

function renderSettingsBody() {
  const body = document.getElementById('skillsBody');
  body.innerHTML = '';

  const asec = document.createElement('div');
  asec.className = 'skill-section';
  const ah = document.createElement('div');
  ah.className = 'skill-provider';
  ah.textContent = 'Appearance';
  asec.appendChild(ah);
  asec.appendChild(fontRow('Font', 'prism.font', { system: 'System', serif: 'Serif', mono: 'Mono' }, 'system'));
  asec.appendChild(fontRow('Size', 'prism.size', { small: 'Small', medium: 'Medium', large: 'Large' }, 'medium'));
  body.appendChild(asec);

  const dsec = document.createElement('div');
  dsec.className = 'skill-section';
  const dh = document.createElement('div');
  dh.className = 'skill-provider';
  dh.textContent = 'Default models';
  dsec.appendChild(dh);
  const dnote = document.createElement('div');
  dnote.className = 'skill-note';
  dnote.style.marginLeft = '0';
  dnote.textContent = 'Which models answer when you don’t @mention one.';
  dsec.appendChild(dnote);
  for (const m of MODELS) {
    const row = document.createElement('label');
    row.className = 'skill-row';
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.dataset.default = '1';
    cb.dataset.id = m.id;
    cb.checked = defaultModels.includes(m.id);
    const t = document.createElement('div');
    t.className = 'skill-text';
    const nm = document.createElement('span');
    nm.className = 'skill-name';
    nm.textContent = m.label;
    t.appendChild(nm);
    row.append(cb, t);
    dsec.appendChild(row);
  }
  body.appendChild(dsec);

  const msec = document.createElement('div');
  msec.className = 'skill-section';
  const mh = document.createElement('div');
  mh.className = 'skill-provider';
  mh.textContent = 'Base model';
  msec.appendChild(mh);
  const mnote = document.createElement('div');
  mnote.className = 'skill-note';
  mnote.style.marginLeft = '0';
  mnote.textContent = 'Model name per service. Blank uses the CLI default.';
  msec.appendChild(mnote);
  for (const m of MODELS) msec.appendChild(modelRow(m));
  body.appendChild(msec);
}

// Skills modal: per-provider skill toggles (fetched on demand, slow).
function renderSkillsBody(data) {
  const body = document.getElementById('skillsBody');
  body.innerHTML = '';
  for (const pid of ['claude', 'gemini', 'codex']) {
    const section = document.createElement('div');
    section.className = 'skill-section';
    const head = document.createElement('div');
    head.className = 'skill-provider';
    head.innerHTML = `<span class="dot" data-id="${pid}"></span>`;
    head.appendChild(document.createTextNode(PROVIDER_LABEL[pid]));
    section.appendChild(head);

    const skills = data[pid] || [];
    if (pid === 'gemini' && skills.length) {
      const note = document.createElement('div');
      note.className = 'skill-note';
      note.textContent = 'Changing these updates the Gemini CLI globally.';
      section.appendChild(note);
    }
    if (pid === 'codex' && skills.length) {
      const note = document.createElement('div');
      note.className = 'skill-note';
      note.textContent = 'Prism tells Codex which selected skills it may use per request.';
      section.appendChild(note);
    }
    if (!skills.length) {
      const empty = document.createElement('div');
      empty.className = 'skill-empty';
      empty.textContent = 'No installed skills.';
      section.appendChild(empty);
    } else {
      for (const s of skills) {
        const row = document.createElement('label');
        row.className = 'skill-row';
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = !!s.enabled;
        cb.dataset.provider = pid;
        cb.dataset.name = s.name;
        const text = document.createElement('div');
        text.className = 'skill-text';
        const nameLine = document.createElement('div');
        nameLine.className = 'skill-nameline';
        const nm = document.createElement('span');
        nm.className = 'skill-name';
        nm.textContent = s.name;
        nameLine.appendChild(nm);
        text.appendChild(nameLine);
        if (s.description) {
          const info = document.createElement('button');
          info.type = 'button';
          info.className = 'skill-info';
          info.title = 'Show description';
          info.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>';
          const desc = document.createElement('span');
          desc.className = 'skill-desc';
          desc.textContent = s.description;
          desc.style.display = 'none';
          info.addEventListener('click', (e) => { e.preventDefault(); e.stopPropagation(); desc.style.display = desc.style.display === 'none' ? 'block' : 'none'; });
          nameLine.appendChild(info);
          text.appendChild(desc);
        }
        row.append(cb, text);
        section.appendChild(row);
      }
    }
    body.appendChild(section);
  }
}

function openSettings() {
  settingsMode = 'settings';
  setModalTitle('Settings');
  renderSettingsBody();
  document.getElementById('settingsModal').classList.add('show');
}

async function openSkills() {
  settingsMode = 'skills';
  setModalTitle('Skills');
  const body = document.getElementById('skillsBody');
  body.innerHTML = '<div class="skill-empty">Loading…</div>';
  document.getElementById('settingsModal').classList.add('show');
  try { renderSkillsBody(await fetch('/skills').then(r => r.json())); }
  catch { body.innerHTML = '<div class="skill-empty">Failed to load skills.</div>'; }
}

function closeSettings() { document.getElementById('settingsModal').classList.remove('show'); }

async function saveSettingsModal() {
  const btn = document.getElementById('settingsSave');
  btn.disabled = true; btn.textContent = 'Saving…';
  let payload;
  if (settingsMode === 'skills') {
    const sel = { claude: [], gemini: [], codex: [] };
    document.querySelectorAll('#skillsBody input[data-provider]').forEach((cb) => {
      if (cb.checked) sel[cb.dataset.provider].push(cb.dataset.name);
    });
    payload = sel;
  } else {
    const dm = [...document.querySelectorAll('#skillsBody input[data-default]')].filter((c) => c.checked).map((c) => c.dataset.id);
    defaultModels = dm;
    const models = {};
    document.querySelectorAll('#skillsBody select[data-modelsel]').forEach((sel) => {
      const id = sel.dataset.modelsel;
      const v = sel.value === '__custom__' ? (document.querySelector(`input[data-modelinput="${id}"]`)?.value.trim() || '') : sel.value;
      if (v) models[id] = v;
    });
    serviceModels = models;
    payload = { defaultModels: dm, models };
  }
  await fetch('/settings', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
  btn.disabled = false; btn.textContent = 'Save';
  closeSettings();
}

// ----- wiring -----
const ta = document.getElementById('prompt');
ta.addEventListener('input', () => { ta.style.height = 'auto'; ta.style.height = ta.scrollHeight + 'px'; });
ta.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
document.getElementById('send').addEventListener('click', send);
document.getElementById('newchat').addEventListener('click', newChat);
document.getElementById('tempchat').addEventListener('click', toggleTemporary);
document.getElementById('settingsBtn').addEventListener('click', openSettings);
document.getElementById('skillsBtn').addEventListener('click', openSkills);
document.getElementById('settingsClose').addEventListener('click', closeSettings);
document.getElementById('settingsCancel').addEventListener('click', closeSettings);
document.getElementById('settingsSave').addEventListener('click', saveSettingsModal);
document.getElementById('settingsModal').addEventListener('click', (e) => { if (e.target.id === 'settingsModal') closeSettings(); });

const fileInput = document.getElementById('fileInput');
document.getElementById('attachBtn').addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => { addFiles(fileInput.files); fileInput.value = ''; });

// Drag-and-drop anywhere in the window
const overlay = document.getElementById('dropOverlay');
let dragDepth = 0;
window.addEventListener('dragenter', (e) => { e.preventDefault(); dragDepth++; overlay.classList.add('show'); });
window.addEventListener('dragover', (e) => e.preventDefault());
window.addEventListener('dragleave', (e) => { e.preventDefault(); if (--dragDepth <= 0) { dragDepth = 0; overlay.classList.remove('show'); } });
window.addEventListener('drop', (e) => {
  e.preventDefault(); dragDepth = 0; overlay.classList.remove('show');
  if (e.dataTransfer?.files?.length) addFiles(e.dataTransfer.files);
});

init();
</script>
